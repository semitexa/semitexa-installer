# Semitexa Local DNS & Nginx Reverse Proxy
#
# Provides local domain resolution (e.g. myapp.test) and HTTP proxy on port 80.
# Managed via: ./bin/semitexa dns:start / dns:stop / dns:add / dns:remove
#
# Do NOT start manually — use `./bin/semitexa dns:start` which also configures
# systemd-resolved to route .test (and other local TLDs) through dnsmasq.

services:
  dns:
    image: alpine:3.21
    container_name: semitexa_dns_1
    restart: unless-stopped
    command: ["sh", "-c", "apk add --no-cache dnsmasq && dnsmasq --keep-in-foreground --conf-file=/etc/dnsmasq.d/dnsmasq.conf"]
    ports:
      - "127.0.0.1:5553:53/udp"
      - "127.0.0.1:5553:53/tcp"
    volumes:
      - ./var/dns/dnsmasq.conf:/etc/dnsmasq.d/dnsmasq.conf:ro
      - ./var/dns/domains.conf:/etc/dnsmasq.d/domains.conf:ro
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "nslookup", "localhost", "127.0.0.1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  proxy:
    image: nginx:alpine
    container_name: semitexa_proxy_1
    restart: unless-stopped
    ports:
      - "80:80"
    command: >
      sh -c '
      echo "server {
        listen 80 default_server;
        server_name _;
        location / {
          proxy_pass http://app:${SWOOLE_PORT:-8080};
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
        }
      }" > /etc/nginx/conf.d/default.conf && nginx -g "daemon off;"'
    depends_on:
      - app
